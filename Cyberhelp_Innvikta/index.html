      <h1>Got Scammed Online? Here's Exactly What to Do.</h1>
      <p>
        Innvikta CyberHelp is a free step-by-step guidance portal for cybercrime victims in India.
        If you've lost money to online fraud, been hacked, or faced cyber harassment — you're in the right place.
      </p>
      <p><strong>This portal is aligned with India's official reporting system:</strong>
        <a href="https://cybercrime.gov.in">National Cyber Crime Reporting Portal (cybercrime.gov.in)</a> and the
        <a href="https://i4c.mha.gov.in/">Indian Cybercrime Coordination Centre (I4C), MHA</a>.
      </p>

      <h2>Immediate Steps After Cyber Fraud</h2>
      <ol>
        <li><strong>Call 1930</strong> – National Cybercrime Helpline. Available 24/7. If money was stolen in the last 2
          hours, this is your highest priority.</li>
        <li><strong>File a complaint online</strong> at <a href="https://cybercrime.gov.in">cybercrime.gov.in</a></li>
        <li><strong>Contact your bank</strong> to freeze or dispute the fraudulent transaction</li>
        <li><strong>Save all evidence</strong> – screenshots of messages, transaction IDs, call logs, and profiles</li>
        <li><strong>File an FIR</strong> at your nearest cyber police station if needed</li>
      </ol>

      <h2>Types of Cybercrime We Help With</h2>
      <p>UPI Fraud, Online Banking Fraud, Social Media Hacking, Identity Theft, Investment Scams (SEBI fraud),
        Sextortion, Phishing, Job Fraud, Loan App Fraud, OTP Fraud, Aadhaar Misuse, Ransomware, and more.</p>

      <h2>Key Resources</h2>
      <p>
        National Cybercrime Helpline: <a href="tel:1930">1930</a> |
        Online Reporting: <a href="https://cybercrime.gov.in">cybercrime.gov.in</a> |
        CERT-In: <a href="https://cert-in.org.in">cert-in.org.in</a> |
        Legal Aid: IT Act 2000, BNS 2023
      </p>

      <h2>About Innvikta CyberHelp</h2>
      <p>
        Innvikta is a cybersecurity firm based in Pune, Maharashtra, India, providing free victim-guidance resources.
        This portal covers 18 cybercrime types, district-level cyber cell contacts for 12 major states,
        bank fraud helplines for 26 banks, and social media grievance officer contacts.
      </p>
